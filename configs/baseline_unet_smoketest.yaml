# Smoke test only: confirms the pipeline runs end-to-end on the actual GPU
# (data loading, forward/backward pass, checkpointing) before committing to
# the full configs/baseline_unet.yaml run. Not a real training result.
run_name: baseline_unet_smoketest
model: unet
data_dir: data
max_epochs: 2
val_interval: 1
batch_size: 2
learning_rate: 1.0e-4
weight_decay: 1.0e-5
dropout: 0.2
early_stopping_patience: 20
num_workers: 4
seed: 0
